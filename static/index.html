<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiveKit Voice Agent</title>
    <!-- LiveKit JS SDK via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Main Content: Agent Status -->
        <main class="sidebar">
            <div class="logo">
                <h2>Voice<span class="highlight">Agent</span></h2>
            </div>
            
            <div class="status-card">
                <div class="orb-container">
                    <div id="agent-orb" class="orb disconnected"></div>
                </div>
                <div class="status-text">
                    <h3 id="agent-state-text">Disconnected</h3>
                    <p id="connection-status">Waiting to connect...</p>
                </div>
            </div>

            <button id="connect-btn" class="primary-btn">Connect to Agent</button>
        </main>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
